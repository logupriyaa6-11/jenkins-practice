name: Simple Test

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Test Runner
        run: echo "Self-hosted runner is working!"

      - name: Send Slack Notification
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data '{"text":"GitHub Actions build completed!"}' \
          ${{ secrets.SLACK_WEBHOOK }}
